name: App Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/app-tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run app tests
        working-directory: app
        run: npm test
